name: SDK – Build & Publish

on:
  push:
    branches: [main]
    paths:
      - "sdk/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build SDK
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "Build failed: dist/index.js missing" && exit 1)
          echo "Build output:"
          ls -lh dist/

      - name: Set version from latest release
        run: |
          TAG=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "v0.1.0")
          VERSION="${TAG#v}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing cooper@${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
